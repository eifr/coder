<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#1e1e1e" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="WebCoder" />
  <link rel="icon" type="image/svg+xml" href="/icon.svg" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <title>WebCoder</title>
  <link rel="stylesheet" href="/style.css" />
  <style>
    html, body, #root { height: 100%; margin: 0; }
    * { box-sizing: border-box; }
    ::-webkit-scrollbar { width: 8px; height: 8px; }
    ::-webkit-scrollbar-track { background: #252526; }
    ::-webkit-scrollbar-thumb { background: #424242; border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }
    .monaco-container { width: 100%; height: 100%; }
  </style>
</head>
<body class="bg-[#1e1e1e] text-[#cccccc] font-sans overflow-hidden">
  <div id="root"></div>
  <script type="module" src="/app.tsx"></script>
</body>
</html>
